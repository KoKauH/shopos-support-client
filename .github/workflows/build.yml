name: Build ShopOS Support (Windows x64)

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths-ignore:
      - "README.md"
      - "LICENSE"
      - "LICENCE"
      - ".github/workflows.upstream/**"
  workflow_dispatch:
    inputs:
      release:
        description: "Create a GitHub Release"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RUST_VERSION: "1.75"
  FLUTTER_VERSION: "3.24.5"
  CARGO_EXPAND_VERSION: "1.0.95"
  FLUTTER_RUST_BRIDGE_VERSION: "1.80.1"
  BRIDGE_FLUTTER_VERSION: "3.22.3"
  LLVM_VERSION: "15.0.6"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
  VERSION: "1.0.0"
  PRODUCT_NAME: "shopos-support"

jobs:
  generate-bridge:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install prerequisites
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake curl gcc git g++ libclang-dev libgtk-3-dev llvm-dev nasm ninja-build pkg-config wget

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-unknown-linux-gnu
          components: rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: bridge-ubuntu-22.04

      - name: Install flutter (bridge version)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.BRIDGE_FLUTTER_VERSION }}
          cache: true

      - name: Install flutter-rust-bridge codegen
        run: |
          cargo install cargo-expand --version ${{ env.CARGO_EXPAND_VERSION }} --locked
          cargo install flutter_rust_bridge_codegen --version ${{ env.FLUTTER_RUST_BRIDGE_VERSION }} --features uuid --locked
          pushd flutter && sed -i -e "s/extended_text: 14.0.0/extended_text: 13.0.0/g" pubspec.yaml && flutter pub get && popd

      - name: Run flutter-rust-bridge
        run: |
          # We removed flutter/ios and flutter/macos for the Windows-only build,
          # so write the C header to the workspace root where Windows build does
          # not need it but the codegen still expects a writable target.
          ~/.cargo/bin/flutter_rust_bridge_codegen --rust-input ./src/flutter_ffi.rs --dart-output ./flutter/lib/generated_bridge.dart --c-output ./bridge_generated.h

      - name: Upload bridge artifact
        uses: actions/upload-artifact@v4
        with:
          name: bridge-artifact
          path: |
            ./src/bridge_generated.rs
            ./src/bridge_generated.io.rs
            ./flutter/lib/generated_bridge.dart
            ./flutter/lib/generated_bridge.freezed.dart

  build-windows-x64:
    needs: generate-bridge
    runs-on: windows-2022
    steps:
      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable("ACTIONS_CACHE_URL", process.env.ACTIONS_CACHE_URL || "");
            core.exportVariable("ACTIONS_RUNTIME_TOKEN", process.env.ACTIONS_RUNTIME_TOKEN || "");

      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Resolve version from tag
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            ver="${GITHUB_REF_NAME#v}"
            echo "VERSION=${ver}" >> $GITHUB_ENV
            echo "Using version ${ver} from tag"
          else
            echo "Using fallback VERSION=${VERSION}"
          fi

      - name: Restore bridge files
        uses: actions/download-artifact@v4
        with:
          name: bridge-artifact
          path: ./

      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: ${{ env.LLVM_VERSION }}

      - name: Install flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Replace flutter engine with rustdesk custom engine
        shell: pwsh
        run: |
          flutter doctor -v
          flutter precache --windows

          # Locate the Flutter SDK root dynamically (subosito/flutter-action
          # may install Flutter under a path that does not match the legacy
          # C:/hostedtoolcache/windows/flutter/stable-<ver>-x64/ layout).
          $flutterBin = (Get-Command flutter).Source
          $flutterRoot = Split-Path -Parent (Split-Path -Parent $flutterBin)
          $engineDir = Join-Path $flutterRoot "bin\cache\artifacts\engine\windows-x64-release"
          Write-Host "Flutter root: $flutterRoot"
          Write-Host "Engine dir:   $engineDir"
          New-Item -ItemType Directory -Force -Path $engineDir | Out-Null

          Invoke-WebRequest -Uri https://github.com/rustdesk/engine/releases/download/main/windows-x64-release.zip -OutFile windows-x64-release.zip
          Expand-Archive -Path windows-x64-release.zip -DestinationPath windows-x64-release
          Move-Item -Force windows-x64-release\* $engineDir

      - name: Patch flutter
        shell: bash
        run: |
          cp .github/patches/flutter_3.24.4_dropdown_menu_enableFilter.diff $(dirname $(dirname $(which flutter)))
          cd $(dirname $(dirname $(which flutter)))
          [[ "3.24.5" == "${{ env.FLUTTER_VERSION }}" ]] && git apply flutter_3.24.4_dropdown_menu_enableFilter.diff

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-pc-windows-msvc
          components: rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: build-windows-2022

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: C:\vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Install vcpkg dependencies
        env:
          VCPKG_DEFAULT_HOST_TRIPLET: x64-windows-static
        shell: bash
        run: |
          if ! $VCPKG_ROOT/vcpkg install --triplet x64-windows-static --x-install-root="$VCPKG_ROOT/installed"; then
            find "${VCPKG_ROOT}/" -name "*.log" | while read -r f; do
              echo "$f:"; echo "======"; cat "$f"; echo "======"; echo
            done
            exit 1
          fi

      - name: Build ShopOS Support
        run: |
          python3 .\build.py --portable --hwcodec --flutter --vram --skip-portable-pack
          mv ./flutter/build/windows/x64/runner/Release ./shopos-support

          # usbmmidd virtual display driver
          Invoke-WebRequest -Uri https://github.com/rustdesk-org/rdev/releases/download/usbmmidd_v2/usbmmidd_v2.zip -OutFile usbmmidd_v2.zip
          Expand-Archive usbmmidd_v2.zip -DestinationPath .
          Remove-Item -Path usbmmidd_v2\Win32 -Recurse
          Remove-Item -Path "usbmmidd_v2\deviceinstaller64.exe","usbmmidd_v2\deviceinstaller.exe","usbmmidd_v2\usbmmidd.bat"
          mv -Force .\usbmmidd_v2 ./shopos-support

      - name: Find Runner.res
        continue-on-error: true
        shell: bash
        run: |
          runner_res=$(find . -name "Runner.res");
          if [ -n "$runner_res" ]; then
            cp "$runner_res" ./libs/portable/Runner.res
          fi

      - name: Build self-extracting installer
        shell: bash
        run: |
          set -euxo pipefail
          sed -i "/dpiAware/d" res/manifest.xml

          # generate.py writes data.bin + app_metadata.toml inside libs/portable
          # and then calls `cargo build --release` via os.system, which silently
          # swallows non-zero exit codes. Drive the build ourselves so any cargo
          # error fails the job loudly.
          pushd ./libs/portable
          pip3 install -r requirements.txt
          python3 ./generate.py -f ../../shopos-support/ -o . -e ../../shopos-support/rustdesk.exe
          popd

          # Build the portable packer explicitly. It is a workspace member, so
          # the binary lands in the workspace target/release/ directory.
          cargo build --release -p rustdesk-portable-packer

          echo "--- target/release contents ---"
          ls -la ./target/release/ | head -50 || true

          # Find the binary regardless of whether it landed in workspace target
          # or libs/portable/target (different cargo versions behave differently).
          packer=""
          for candidate in ./target/release/rustdesk-portable-packer.exe ./libs/portable/target/release/rustdesk-portable-packer.exe; do
            if [ -f "$candidate" ]; then
              packer="$candidate"
              break
            fi
          done

          if [ -z "$packer" ]; then
            echo "ERROR: rustdesk-portable-packer.exe not found after cargo build"
            find . -name "rustdesk-portable-packer*" 2>/dev/null || true
            exit 1
          fi

          mkdir -p ./output
          cp "$packer" ./output/${{ env.PRODUCT_NAME }}-${{ env.VERSION }}-x64.exe
          ls -la ./output/

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: shopos-support-windows-x64
          path: ./output/${{ env.PRODUCT_NAME }}-${{ env.VERSION }}-x64.exe
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.release == true)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || format('v{0}-{1}', env.VERSION, github.run_number) }}
          name: ShopOS Support ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || format('v{0} (build {1})', env.VERSION, github.run_number) }}
          body: |
            Брендированный клиент ShopOS Support для Windows x64.

            **Сервер по умолчанию:** help.shopos.kz
            **Скачать последнюю версию:** https://help.shopos.kz

            Этот билд автоматически собран из исходников в этом репозитории.
            Лицензия: AGPL-3.0.
          files: ./output/${{ env.PRODUCT_NAME }}-${{ env.VERSION }}-x64.exe
          draft: false
          prerelease: false
